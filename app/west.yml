manifest:
  version: "0.13"

  remotes:
    - name: zephyrproject
      url-base: https://github.com/zephyrproject-rtos

  projects:
    - name: zephyr
      remote: zephyrproject
      repo-path: zephyr
      revision: main
      path: zephyr
      clone-depth: 1
      import:
        name-allowlist:
          - hal_nxp
          - cmsis
          - mbedtls

  self:
    path: app
