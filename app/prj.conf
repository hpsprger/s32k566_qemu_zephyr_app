#
# prj.conf - Application configuration
#

# Console / UART
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# Kernel
CONFIG_NEWLIB_LIBC=n
CONFIG_PRINTK=y

# Reduce footprint
CONFIG_MINIMAL_LIBC=y
CONFIG_SYS_CLOCK_HW_CYCLES_PER_SEC=48000000

# QEMU demo: Zephyr's S32K566 XIP flash starts at 0x08000100, which creates
# an MPU region that is not power-of-two aligned. QEMU's Cortex-M MPU rejects
# it, so disable MPU for the emulated hello-world target.
CONFIG_ARM_MPU=n
CONFIG_MPU=n
